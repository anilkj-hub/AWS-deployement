version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: product_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000

  frontend:
    build:
      context: ./frontend
    container_name: product_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
